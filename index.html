<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPA Calculator | Ahmed - Mechanical Eng</title>

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-Y6GSQ6SPP2"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-Y6GSQ6SPP2');
    </script>

    <style>
        :root { --primary: #003366; --accent: #d4af37; --bg: #f8fafc; --success: #10b981; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding: 15px; color: #334155; }
        .container { max-width: 680px; margin: auto; background: white; padding: 25px; border-radius: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border-top: 10px solid var(--primary); }
        .header-logo { text-align: center; margin-bottom: 20px; }
        .logo-icon { font-size: 50px; color: var(--primary); animation: rotateGear 5s linear infinite; display: inline-block; }
        @keyframes rotateGear { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        h1 { color: var(--primary); text-align: center; font-size: 1.6rem; margin: 0; }
        .subtitle { text-align: center; color: #64748b; font-size: 0.85rem; margin-bottom: 25px; }
        .grad-info { background: #eff6ff; padding: 15px; border-radius: 16px; margin-bottom: 20px; text-align: center; border: 1px solid #bfdbfe; }
        .progress-container { background: #e2e8f0; height: 12px; border-radius: 10px; margin: 12px 0; overflow: hidden; }
        .progress-bar { background: var(--success); height: 100%; width: 0%; transition: 1s ease-in-out; }
        .section { background: #ffffff; padding: 20px; border-radius: 16px; margin-bottom: 20px; border: 1px solid #e2e8f0; }
        h3 { margin-top: 0; color: var(--primary); font-size: 1rem; border-right: 4px solid var(--accent); padding-right: 10px; }
        .course-row { display: flex; gap: 8px; margin-bottom: 10px; align-items: center; background: #f9fafb; padding: 8px; border-radius: 10px; }
        input, select { padding: 10px; border: 1.5px solid #f1f5f9; border-radius: 8px; width: 100%; font-weight: 600; }
        .btn-calc { background: var(--primary); color: white; width: 100%; padding: 16px; border: none; border-radius: 12px; font-size: 1.2rem; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-calc:hover { opacity: 0.9; transform: translateY(-2px); }
        #results { margin-top: 25px; display: none; text-align: center; padding: 25px; background: var(--primary); color: white; border-radius: 20px; }
        .res-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        .gpa-num { font-size: 2.2rem; font-weight: 800; color: var(--accent); display: block; }
        .gpa-rating { font-size: 1.3rem; font-weight: bold; color: white; margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 10px; }
        
        /* التذييل الجديد */
        .developer-footer { margin-top: 40px; padding: 25px 15px; border-top: 2px solid #f1f5f9; text-align: center; }
        .dev-sub { font-size: 1rem; color: var(--primary); font-weight: 700; margin-bottom: 4px; }
        .dev-uni { font-size: 0.85rem; color: #64748b; margin-bottom: 15px; display: block; }
        .by-ahmed { font-family: 'Georgia', serif; font-size: 1.4rem; font-weight: bold; color: var(--primary); letter-spacing: 1px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container" id="main-content">
    <div class="header-logo">
        <div class="logo-icon">⚙️</div>
        <h1>حاسبة GPA هندسة الإسكندرية</h1>
        <p class="subtitle">كلية الهندسة </p>
    </div>

    <div class="grad-info">
        <span id="h-summary" style="font-weight: bold;">الإنجاز: 0 / 144 ساعة</span>
        <div class="progress-container"><div id="p-bar" class="progress-bar"></div></div>
        <small id="h-left" style="color: #1e40af; font-weight: bold;"></small>
    </div>

    <div class="section">
        <h3>📊 السجل التراكمي</h3>
        <div style="display: flex; gap: 10px;">
            <div style="flex:1"><label style="font-size: 0.8rem;">CGPA الحالي:</label><input type="number" id="oldCGPA" step="0.01" placeholder="0.00"></div>
            <div style="flex:1"><label style="font-size: 0.8rem;">الساعات المنجزة (ناجح فقط):</label><input type="number" id="oldHours" placeholder="0"></div>
        </div>
    </div>

    <div class="section">
        <h3>📝 مواد الترم الحالي</h3>
        <div id="currentList"></div>
        <button class="btn-calc" style="background:#f1f5f9; color:var(--primary); font-size:0.8rem; padding:8px; margin-top:10px;" onclick="addRow()">+ إضافة مادة</button>
    </div>

    <button class="btn-calc" onclick="calculate()">احسب المعدل النهائي</button>

    <div id="results">
        <div class="res-grid">
            <div style="background: rgba(255,255,255,0.1); padding: 12px; border-radius: 15px;">
                <small>GPA الترم</small>
                <span class="gpa-num" id="res-term-gpa">0.00</span>
            </div>
            <div style="background: rgba(255,255,255,0.1); padding: 12px; border-radius: 15px;">
                <small>CGPA التراكمي</small>
                <span class="gpa-num" id="res-cgpa">0.00</span>
            </div>
        </div>
        <div id="rating-text" class="gpa-rating"></div>
    </div>

    <div class="developer-footer">
        <div class="dev-sub">Mechanical Engineering</div>
        <span class="dev-uni">Alexandria University - Faculty of Engineering</span>
        <div class="by-ahmed">By Ahmed</div>
    </div>
</div>

<script>
    const GRAD_HOURS = 144;
    const GRADES = { "A": 4.0, "A-": 3.7, "B+": 3.3, "B": 3.0, "B-": 2.7, "C+": 2.3, "C": 2.0, "C-": 1.7, "D+": 1.3, "D": 1.0, "F": 0.0 };

    function addRow() {
        const div = document.createElement('div');
        div.className = 'course-row';
        div.innerHTML = `
            <input type="number" placeholder="ساعة" class="h" style="width: 70px;">
            <select class="g" style="flex: 1;">
                ${Object.keys(GRADES).map(g => `<option value="${GRADES[g]}">${g}</option>`).join('')}
            </select>
            <label style="font-size:0.65rem; min-width:50px;"><input type="checkbox" class="is-re"> إعادة (F)؟</label>
            <button onclick="this.parentElement.remove()" style="border:none; background:none; color:red; cursor:pointer;">✕</button>
        `;
        document.getElementById('currentList').appendChild(div);
    }

    function getRatingFromImage(gpa) {
        if (gpa >= 3.7) return "امتياز مرتفع";
        if (gpa >= 3.3) return "امتياز";
        if (gpa >= 3.0) return "جيد جداً مرتفع";
        if (gpa >= 2.7) return "جيد جداً";
        if (gpa >= 2.3) return "جيد مرتفع";
        if (gpa >= 2.0) return "جيد";
        return "تحت الإنذار";
    }

    function calculate() {
        let oldCGPA = parseFloat(document.getElementById('oldCGPA').value) || 0;
        let oldHours = parseFloat(document.getElementById('oldHours').value) || 0;
        
        let oldPoints = oldCGPA * oldHours;
        let termPoints = 0, termHours = 0, termPassedHours = 0, reHoursToSubtract = 0;

        document.querySelectorAll('#currentList .course-row').forEach(row => {
            let h = parseFloat(row.querySelector('.h').value) || 0;
            let g = parseFloat(row.querySelector('.g').value);
            let isRe = row.querySelector('.is-re').checked;

            termPoints += (h * g);
            termHours += h;
            if (g > 0) termPassedHours += h;
            if (isRe) reHoursToSubtract += h;
        });

        let termGPA = termHours > 0 ? (termPoints / termHours) : 0;
        let totalRecordedHours = (oldHours + termHours) - reHoursToSubtract;
        let finalCGPA = totalRecordedHours > 0 ? ((oldPoints + termPoints) / totalRecordedHours) : 0;

        let totalPassedHours = (oldHours + termPassedHours) - (reHoursToSubtract > 0 && termPassedHours >= reHoursToSubtract ? reHoursToSubtract : 0);

        document.getElementById('results').style.display = 'block';
        document.getElementById('res-term-gpa').innerText = termGPA.toFixed(2);
        document.getElementById('res-cgpa').innerText = finalCGPA.toFixed(2);
        document.getElementById('rating-text').innerText = "التقدير التراكمي: " + getRatingFromImage(finalCGPA);

        let progressPercent = Math.min((totalPassedHours / GRAD_HOURS) * 100, 100);
        document.getElementById('p-bar').style.width = progressPercent + "%";
        document.getElementById('h-summary').innerText = `الإنجاز: ${totalPassedHours} / ${GRAD_HOURS} ساعة`;
        document.getElementById('h-left').innerText = `باقي ${Math.max(GRAD_HOURS - totalPassedHours, 0)} ساعة على التخرج`;
    }

    window.onload = function() { for(let i=0; i<5; i++) addRow(); };
</script>
</body>
</html>
